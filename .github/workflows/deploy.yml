name: Deploy FastAPI to Azure VM

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/my-fastapi-app:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/my-fastapi-app:latest

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST_IP }}
          username: adminuser
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            # 1. Install Docker
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
            fi
            
            # 2. Install Azure CLI
            if ! command -v az &> /dev/null; then
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            fi
            
            # 3. Pull and Run the App
            sudo az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}
            sudo docker stop fastapi-app || true 
            sudo docker rm fastapi-app || true
            sudo docker pull ${{ secrets.ACR_LOGIN_SERVER }}/my-fastapi-app:latest
            sudo docker run -d --name fastapi-app -p 80:8000 ${{ secrets.ACR_LOGIN_SERVER }}/my-fastapi-app:latest